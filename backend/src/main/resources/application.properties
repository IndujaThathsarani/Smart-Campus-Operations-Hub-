spring.application.name=smartcampus-backend

# Spring Boot MongoDB connection. Atlas is the default so resource CRUD saves to your cluster.
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb+srv://induja:1234@cluster0.qckcptz.mongodb.net/SmartCampus?retryWrites=true&w=majority&appName=Cluster0}
spring.data.mongodb.uri=${SPRING_MONGODB_URI:mongodb+srv://induja:1234@cluster0.qckcptz.mongodb.net/SmartCampus?retryWrites=true&w=majority&appName=Cluster0}
spring.mongodb.database=SmartCampus
spring.data.mongodb.database=SmartCampus
spring.data.mongodb.auto-index-creation=true

server.port=8081
# spring.security.enabled=false

app.upload.dir=uploads/tickets
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB

logging.level.org.springframework.security=DEBUG

# ===== DEVTOOLS CONFIGURATION =====
# Enable automatic restart
spring.devtools.restart.enabled=true

# Watch for changes in these directories
spring.devtools.restart.additional-paths=src/main/java

# Exclude static resources from triggering restart (optional)
spring.devtools.restart.exclude=static/**,public/**,templates/**

# Enable LiveReload (automatic browser refresh)
spring.devtools.livereload.enabled=true

# Log DevTools status for debugging
logging.level.org.springframework.boot.devtools=DEBUG


# MongoDB
spring.data.mongodb.uri=${SPRING_MONGODB_URI}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Optional: keep default redirect pattern
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}