spring.application.name=smartcampus-backend

# Spring Boot 4: connection uses spring.mongodb.* (MongoProperties). spring.data.mongodb.* is only for Spring Data extras.
# Atlas: set SPRING_MONGODB_URI (or legacy SPRING_DATA_MONGODB_URI). Local default if both unset:
# PowerShell: $env:SPRING_MONGODB_URI = "mongodb+srv://USER:PASS@cluster.../SmartCampus?retryWrites=true&w=majority&appName=Cluster0"
# spring.mongodb.uri=${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/SmartCampus}}
spring.mongodb.uri=mongodb+srv://buddhimasankalapa_db_user:buddhima123@cluster0.qckcptz.mongodb.net/SmartCampus?retryWrites=true&w=majority
spring.mongodb.database=SmartCampus
spring.data.mongodb.auto-index-creation=true

server.port=8081
# spring.security.enabled=false

app.upload.dir=uploads/tickets
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB

logging.level.org.springframework.security=DEBUG

# ===== DEVTOOLS CONFIGURATION =====
# Enable automatic restart
spring.devtools.restart.enabled=true

# Watch for changes in these directories
spring.devtools.restart.additional-paths=src/main/java

# Exclude static resources from triggering restart (optional)
spring.devtools.restart.exclude=static/**,public/**,templates/**

# Enable LiveReload (automatic browser refresh)
spring.devtools.livereload.enabled=true

# Log DevTools status for debugging
logging.level.org.springframework.boot.devtools=DEBUG